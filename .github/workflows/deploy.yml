name: Stamp version on push

on:
  push:
    branches: [main]

jobs:
  stamp:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Stamp version in index.html
        run: |
          VERSION="v$(date -u '+%Y.%m.%d.%H:%M')"
          BUILD="$(date -u '+%Y%m%d%H%M%S')"
          sed -i "s|<span style=\"font-size: 10px; opacity: 0.5;\">v[^<]*</span>|<span style=\"font-size: 10px; opacity: 0.5;\">${VERSION}</span>|" index.html
          sed -i "s|src/main.js?v=[^\"]*|src/main.js?v=${BUILD}|" index.html
          echo "Stamped: $VERSION build: $BUILD"

      - name: Commit stamped version
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git diff --quiet || git commit -am "chore: stamp version $(date -u '+%Y.%m.%d.%H:%M')"
          git push
